## Optional reference HOCON for ChatApp EMQX (Phase 0 + 1).
## Runtime config is applied via docker-compose environment variables and the
## mounted acl.conf. Keep this file as documentation of the intended settings.

authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    user_id_type = username
  },
  {
    mechanism = jwt
    from = password
    use_jwks = false
    algorithm = hmac-based
    secret = "same-as-JWT_SECRET"
    secret_base64_encoded = false
  }
]

authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = file
      enable = true
      path = "etc/acl.conf"
    }
  ]
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  mqtt_path = "/mqtt"
}
