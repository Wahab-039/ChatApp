%% ChatApp EMQX ACL (Phase 1)
%% MQTT username for end users MUST equal their user UUID (JWT subject).
%% MQTT username for the API publisher MUST be chatapp_service.
%%
%% Note: ${username} placeholders work in topic filters with `all`,
%% not inside {username, "${username}"} (that matches the literal string).

%% Go service account may publish chat events to user inboxes and groups.
{allow, {username, "chatapp_service"}, publish, [
  "chat/user/+/inbox",
  "chat/group/+"
]}.

%% End users may subscribe only to their own inbox/presence/ack topics.
{allow, all, subscribe, [
  "chat/user/${username}/inbox",
  "chat/user/${username}/presence",
  "chat/user/${username}/ack"
]}.

%% End users may publish acknowledgements only on their own ack topic.
{allow, all, publish, [
  "chat/user/${username}/ack"
]}.

%% Deny everything else.
{deny, all}.
