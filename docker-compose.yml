services:
  emqx:
    image: emqx/emqx:5.8.6
    container_name: chatapp-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"       # MQTT TCP (future Go publisher)
      - "8083:8083"       # MQTT over WebSocket
      - "18083:18083"     # Dashboard / management API
    env_file:
      - .env
    environment:
      EMQX_NAME: chatapp
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}

      # Auth chain: 1) service password account, 2) end-user JWT (password field = access token)
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__NAME: sha256
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__SALT_POSITION: suffix

      EMQX_AUTHENTICATION__2__MECHANISM: jwt
      EMQX_AUTHENTICATION__2__FROM: password
      EMQX_AUTHENTICATION__2__USE_JWKS: "false"
      EMQX_AUTHENTICATION__2__ALGORITHM: hmac-based
      EMQX_AUTHENTICATION__2__SECRET: ${JWT_SECRET}
      EMQX_AUTHENTICATION__2__SECRET_BASE64_ENCODED: "false"

      # Deny by default; rules come from the mounted ACL file.
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__DENY_ACTION: disconnect
    volumes:
      - ./deploy/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

volumes:
  emqx-data:
  emqx-log:
